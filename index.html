<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚛 Mudflap Ad Creative Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#111827;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* Header */
.header{background:white;border-bottom:1px solid #e5e7eb;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20}
.header-title{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:#9ca3af;margin-top:1px}
.btn-primary{background:#2563eb;color:white;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600}
.btn-primary:hover{background:#1d4ed8}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:14px 20px 0}
.stat{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:10px;text-align:center}
.stat-val{font-size:22px;font-weight:700}
.stat-label{font-size:11px;color:#9ca3af;margin-top:1px}

/* Tabs */
.tabs{background:white;border-bottom:1px solid #e5e7eb;padding:0 20px;margin-top:14px;display:flex;gap:20px}
.tab{padding:10px 0;font-size:13px;font-weight:500;border:none;background:none;border-bottom:2px solid transparent;color:#6b7280}
.tab.active{border-bottom-color:#2563eb;color:#2563eb}
.tab-count{margin-left:4px;font-size:11px;background:#f3f4f6;color:#6b7280;padding:1px 6px;border-radius:99px}

/* Filters */
.filters{padding:12px 20px 6px;display:flex;gap:8px;flex-wrap:wrap}
.filters input,.filters select{border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:13px;background:white}
.filters input{width:180px}
.filters select{width:160px}
.btn-clear{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #e5e7eb;background:white;color:#6b7280}

/* Content */
.content{padding:6px 20px 40px}

/* Card */
.card{background:white;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:8px;overflow:hidden}
.card.winner{border-color:#a78bfa}
.card-header{padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.card-info{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:600;color:#111827}
.card-pills{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:3px}
.card-insight{font-size:12px;color:#6b7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-notes{font-size:11px;color:#9ca3af;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-actions{display:flex;gap:5px;flex-shrink:0;align-items:center}
.card-actions select{font-size:11px;border:1px solid #e5e7eb;border-radius:6px;padding:3px 5px;background:white}
.btn-dupe{font-size:11px;color:#7c3aed;border:1px solid #e9d5ff;background:white;border-radius:6px;padding:3px 7px}
.btn-edit{font-size:11px;color:#2563eb;border:1px solid #bfdbfe;background:white;border-radius:6px;padding:3px 7px}
.btn-expand{font-size:11px;color:#6b7280;border:1px solid #e5e7eb;background:white;border-radius:6px;padding:3px 7px}
.btn-delete{font-size:11px;color:#ef4444;border:1px solid #fecaca;background:white;border-radius:6px;padding:3px 7px}

/* Pills */
.pill{font-size:11px;padding:1px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.pill-status-Upcoming{background:#dbeafe;color:#1e40af;border:1px solid #1e40af33}
.pill-status-InCopyProduction{background:#fef9c3;color:#713f12;border:1px solid #713f1233}
.pill-status-NeedsCopyReview{background:#ffedd5;color:#7c2d12;border:1px solid #7c2d1233}
.pill-status-InDesign{background:#fce7f3;color:#831843;border:1px solid #83184333}
.pill-status-Live{background:#dcfce7;color:#14532d;border:1px solid #14532d33}
.pill-status-Winner{background:#ede9fe;color:#4c1d95;border:1px solid #4c1d9533}
.pill-status-MovedtoArchive{background:#f3f4f6;color:#374151;border:1px solid #37415133}
.pill-stage{background:#dbeafe;color:#1e40af}
.pill-format{background:#f3f4f6;color:#374151}
.pill-tone{background:#fef9c3;color:#713f12}

/* Card body */
.card-body{border-top:1px solid #f3f4f6;padding:12px 14px;background:#f9fafb;display:flex;flex-direction:column;gap:12px}
.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px}
.meta-label{font-weight:600;color:#9ca3af;font-size:10px;text-transform:uppercase}
.meta-val{color:#374151}
.section-title{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#9ca3af;margin-bottom:6px}
.scene-block{border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px;background:white;font-size:12px;margin-bottom:6px}
.scene-title{font-weight:600;color:#374151;margin-bottom:4px}
.scene-timing{color:#9ca3af;font-weight:400}
.scene-row{margin-bottom:4px}
.scene-row-label{font-size:11px;font-weight:600;color:#9ca3af;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.scene-text{color:#374151;line-height:1.5;white-space:pre-wrap}
.scene-prompt{color:#6b7280;line-height:1.5;white-space:pre-wrap}
.copy-btn{font-size:11px;padding:2px 7px;border-radius:4px;border:1px solid #e5e7eb;background:#f9fafb;color:#9ca3af}
.copy-btn.copied{background:#dcfce7;color:#15803d}
.meta-copy-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;background:white;border:1px solid #e5e7eb;border-radius:8px;padding:6px 10px;font-size:12px;margin-bottom:4px}
.perf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.perf-item label{font-size:11px;color:#9ca3af;display:block;margin-bottom:2px}
.perf-item input{border:1px solid #e5e7eb;border-radius:6px;padding:3px 7px;font-size:12px;width:100%}

/* Collapsible sections */
.coll{border-radius:10px;overflow:hidden;margin-bottom:10px}
.coll-header{width:100%;display:flex;justify-content:space-between;padding:10px 14px;font-size:13px;font-weight:600;border:none;cursor:pointer}
.coll-body{padding:10px;display:flex;flex-direction:column;gap:6px}

/* Empty */
.empty{text-align:center;padding:36px;color:#9ca3af;font-size:13px;border:1px dashed #e5e7eb;border-radius:10px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;font-size:12px;background:white;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;border-collapse:collapse}
thead{background:#f9fafb}
th{padding:8px 10px;text-align:left;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap;cursor:pointer}
td{padding:7px 10px;border-bottom:1px solid #f3f4f6}
tr:last-child td{border-bottom:none}
tr:nth-child(even){background:#f9fafb}
.td-concept{font-weight:500;color:#111827;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-brief{color:#9ca3af;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl-actions button{font-size:11px;background:none;border:none;cursor:pointer;margin-right:6px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:50;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:28px 14px}
.modal{background:white;border-radius:14px;width:100%;max-width:620px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-header{padding:18px 24px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-size:17px;font-weight:700}
.modal-sub{font-size:11px;color:#9ca3af;margin-top:1px}
.modal-close{font-size:20px;background:none;border:none;color:#9ca3af;line-height:1}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:22px}
.modal-footer{padding:14px 24px;border-top:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.btn-cancel{font-size:13px;color:#9ca3af;background:none;border:none}
.form-section-title{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#9ca3af;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #f3f4f6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:3px}
.form-input,.form-select,.form-textarea{border:1px solid #e5e7eb;border-radius:8px;padding:7px 10px;font-size:13px;width:100%;background:white;font-family:inherit}
.form-textarea{resize:none}
.form-hint{font-size:11px;color:#6b7280;margin-top:4px;background:#f9fafb;border-radius:6px;padding:6px 8px}
.locked-box{border:1px dashed #e5e7eb;border-radius:10px;padding:18px;text-align:center}
.locked-title{font-size:13px;font-weight:500;color:#9ca3af}
.locked-sub{font-size:12px;color:#9ca3af;margin-top:3px}
.scene-form{border:1px solid #e5e7eb;border-radius:10px;padding:12px;background:#f9fafb;margin-bottom:10px}
.scene-form-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.scene-form-label{font-size:13px;font-weight:700;color:#111827}
.scene-timing-pill{font-size:11px;color:#9ca3af;background:white;border:1px solid #e5e7eb;border-radius:99px;padding:1px 7px}
.copy-spec-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;margin-bottom:12px}
.copy-spec-title{font-size:12px;font-weight:600;color:#1e40af;margin-bottom:1px}
.copy-spec-note{font-size:12px;color:#3b82f6}
.char-count{font-size:11px}
.char-over{color:#ef4444;font-weight:700}
.char-ok{color:#9ca3af}
.border-red{border-color:#fca5a5}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:white;padding:10px 16px;border-radius:8px;font-size:13px;z-index:100;opacity:0;transition:opacity 0.2s}
.toast.show{opacity:1}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;color:#9ca3af;font-size:14px}
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://fngxmhqkowrkzpgcofbn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mFjXHIEIYbJ_n_Dr2xWzCA_zdIpbiOq';
const TABLE = 'ads';

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const TONES = [{v:'Humor',d:'Uses comedy or absurdity to earn attention and lower defenses'},{v:'Empathetic',d:"Mirrors the operator's stress or frustration before offering relief"},{v:'Provocative',d:'Designed to create mild tension or challenge an assumption'},{v:'Direct / Authoritative',d:'Straightforward and credibility-first. States the fact or leads with proof.'},{v:'TBD',d:''}];
const PRODS = [{v:'AI-Generated',d:'Visuals created entirely with AI image or video generation tools'},{v:'Live Shoot',d:'Real footage shot on location with a crew or handheld camera'},{v:'Motion Design',d:'Animated graphics, type, or illustrated elements built in post'},{v:'Stock',d:'Licensed footage or imagery from a stock library'},{v:'TBD',d:''}];
const VISUALS = [{v:'Cinematic',d:'Polished, high-production. Looks like a TV spot or short film.'},{v:'Handheld / Documentary',d:'Raw, real-feeling. Feels like it was shot on location in the moment.'},{v:'Talking Head',d:'Someone speaking directly to camera.'},{v:'Typography-Led',d:'Words and numbers are the visual. Text animates on screen.'},{v:'Graphic / Illustrated',d:'Charts, callouts, drawn visuals. Designed rather than filmed.'},{v:'Split Screen / Comparison',d:'Side-by-side structure. Two things being contrasted visually.'},{v:'Screen / UI',d:'The product interface is the visual.'},{v:'Mixed',d:'Combines two styles — e.g. handheld footage with text overlays.'},{v:'TBD',d:''}];
const STAGES = ['Awareness','Consideration','Intent','Retargeting','Usage/Expansion'];
const JOBS = ['Interrupt','Reframe','Prove','Convert','Reinforce','Validate'];
const FMTS = ['Reel','Carousel','Static','Video (Feed)'];
const ALL_ST = ['Upcoming','In Copy Production','Needs Copy Review','In Design','Live','Winner','Moved to Archive'];
const PROD_ST = ['In Copy Production','Needs Copy Review','In Design'];
const ARC_ST = ['Live','Winner','Moved to Archive'];
const GROUPS = ['Brief 1 — Self-Aware AI','Brief 2 — Lifestyle / Chaos','Brief 3 — Math Motion','Brief 4 — Inertia / Habits','Brief 5 — Health / Peace of Mind','Brief 6 — Absurd Fees','Brief 7 — Customer Support','Pillar 1 — Money / Business','Pillar 2 — Life / Identity','Pillar 3 — Debate','Pillar 4 — Trucks and Tech','Pillar 5 — Health & Wellbeing','Pillar 6 — Roadcraft','Pillar 7 — Status / Respect','Claims Ads','Doc 1'];
const STAGE_D = {Awareness:"They have a pain but haven't done anything about it. Job: interrupt and make the problem feel real.",Consideration:"They're thinking 'maybe there's a better way.' Job: shift their thinking.",Intent:'Actively comparing options. Job: prove Mudflap is best and remove doubt.',Retargeting:"Seen the ads but haven't signed up. Job: nudge over the finish line.",'Usage/Expansion':'Already using Mudflap. Job: validate their decision and build identity.'};
const FMT_D = {Reel:'Short, punchy videos. Top of funnel, grab attention cold. Hook must land in 1 second.','Video (Feed)':'Slightly longer. Build trust with testimonials or storytelling.',Carousel:'Swipeable cards. Walk someone through a logical argument step by step.',Static:"Simple, cheap, fast. Best for reminding people who've already seen the brand."};
const COPY_S = {Reel:{note:'Reels run full-screen. Only Primary Text appears in feed entry points.',f:[{k:'primaryText',l:'Primary Text',lim:125}]},'Video (Feed)':{note:'Feed video shows Primary Text above, Headline + Description below.',f:[{k:'primaryText',l:'Primary Text',lim:125},{k:'headline',l:'Headline',lim:40},{k:'description',l:'Description',lim:30}]},Static:{note:'Image ads support the full suite of copy fields.',f:[{k:'primaryText',l:'Primary Text',lim:125},{k:'headline',l:'Headline',lim:40},{k:'description',l:'Description',lim:30},{k:'displayUrl',l:'Display URL',lim:255}]},Carousel:{note:'Overall Primary Text at top, then each card has its own Headline and Description.',f:[{k:'primaryText',l:'Primary Text',lim:125},{k:'headline',l:'Per-Card Headline',lim:40},{k:'description',l:'Per-Card Description',lim:20},{k:'displayUrl',l:'Display URL',lim:255}]}};
const SCENE_DEFS = [{id:'ha',label:'Scene 1 — Hook A',timing:'0–2s'},{id:'hb',label:'Scene 1 — Hook B',timing:'0–2s'},{id:'hc',label:'Scene 1 — Hook C',timing:'0–2s'},{id:'pr',label:'Scene 2 — Problem',timing:'2–5s'},{id:'ins',label:'Scene 3 — Insight',timing:'5–8s'},{id:'sol',label:'Scene 4 — Solution',timing:'8–12s'},{id:'ct',label:'Scene 5 — CTA',timing:'12–15s'}];

const SC_BG = {Upcoming:'#dbeafe','In Copy Production':'#fef9c3','Needs Copy Review':'#ffedd5','In Design':'#fce7f3',Live:'#dcfce7',Winner:'#ede9fe','Moved to Archive':'#f3f4f6'};
const SC_TX = {Upcoming:'#1e40af','In Copy Production':'#713f12','Needs Copy Review':'#7c2d12','In Design':'#831843',Live:'#14532d',Winner:'#4c1d95','Moved to Archive':'#374151'};

// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── STATE ────────────────────────────────────────────────────────────────────
let ads = [];
let tab = 0;
let search = '';
let fStage = 'All';
let fGroup = 'All';
let sortCol = 'concept';
let sortDir = 'asc';
let expandedIds = new Set();
let collReview = false;
let collDesign = false;
let showForm = false;
let editId = null;
let form = blankForm();
let loading = true;
let saving = false;

function blankScenes() {
  return SCENE_DEFS.map(s => ({...s, vo:'', prompt:''}));
}
function blankForm() {
  return {concept:'',funnelStage:'',job:'',format:'Reel',tone:'',productionMethod:'',visualStyle:'',week:'',status:'Upcoming',coreInsight:'',hypothesis:'',notes:'',metaCopy:{primaryText:'',headline:'',description:'',displayUrl:''},scenes:blankScenes(),metrics:{thumbStop:'',viewRate:'',completionRate:'',ctr:'',cpa:'',notes:''}};
}

// ─── DB HELPERS ───────────────────────────────────────────────────────────────
async function loadAds() {
  try {
    const { data, error } = await sb.from(TABLE).select('*').order('created_at', {ascending:true});
    if (error) {
      if (error.code === '42P01') { await createTable(); return loadAds(); }
      throw error;
    }
    ads = (data || []).map(row => ({...row, scenes: row.scenes || blankScenes(), metaCopy: row.meta_copy || {primaryText:'',headline:'',description:'',displayUrl:''}, metrics: row.metrics || {thumbStop:'',viewRate:'',completionRate:'',ctr:'',cpa:'',notes:''}}));
  } catch(e) { toast('Error loading ads: ' + e.message); }
  loading = false;
  render();
}

async function createTable() {
  const sql = `
    create table if not exists ads (
      id uuid primary key default gen_random_uuid(),
      created_at timestamptz default now(),
      concept text, funnel_stage text, job text, format text, tone text,
      production_method text, visual_style text, week text, status text default 'Upcoming',
      core_insight text, hypothesis text, notes text,
      scenes jsonb default '[]'::jsonb,
      meta_copy jsonb default '{}'::jsonb,
      metrics jsonb default '{}'::jsonb,
      primary_text text
    );
    alter table ads enable row level security;
    create policy if not exists "public_all" on ads for all using (true) with check (true);
  `;
  await sb.rpc('exec_sql', {sql}).catch(() => null);
}

async function saveAd(data) {
  const row = {
    concept: data.concept, funnel_stage: data.funnelStage, job: data.job,
    format: data.format, tone: data.tone, production_method: data.productionMethod,
    visual_style: data.visualStyle, week: data.week, status: data.status,
    core_insight: data.coreInsight, hypothesis: data.hypothesis, notes: data.notes,
    scenes: data.scenes, meta_copy: data.metaCopy, metrics: data.metrics,
    primary_text: data.metaCopy?.primaryText || ''
  };
  if (data.id && !data.id.startsWith('new_')) {
    const { error } = await sb.from(TABLE).update(row).eq('id', data.id);
    if (error) { toast('Save failed: ' + error.message); return false; }
    ads = ads.map(a => a.id === data.id ? {...data, ...row} : a);
  } else {
    const { data: inserted, error } = await sb.from(TABLE).insert(row).select().single();
    if (error) { toast('Save failed: ' + error.message); return false; }
    ads = [{...data, id: inserted.id, created_at: inserted.created_at}, ...ads];
  }
  return true;
}

async function deleteAd(id) {
  const { error } = await sb.from(TABLE).delete().eq('id', id);
  if (error) { toast('Delete failed: ' + error.message); return; }
  ads = ads.filter(a => a.id !== id);
  render();
}

async function updateStatus(id, status) {
  const { error } = await sb.from(TABLE).update({status}).eq('id', id);
  if (error) { toast('Update failed'); return; }
  ads = ads.map(a => a.id === id ? {...a, status} : a);
  render();
}

async function updateMetric(id, key, val) {
  const ad = ads.find(a => a.id === id);
  if (!ad) return;
  const metrics = {...(ad.metrics||{}), [key]: val};
  ads = ads.map(a => a.id === id ? {...a, metrics} : a);
  await sb.from(TABLE).update({metrics}).eq('id', id);
  render();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function pillStatus(s) {
  const key = (s||'').replace(/ /g,'');
  return `<span class="pill pill-status-${key}" style="background:${SC_BG[s]||'#f3f4f6'};color:${SC_TX[s]||'#374151'};border:1px solid ${SC_TX[s]||'#374151'}33">${s}</span>`;
}

function filtered(list) {
  const q = search.toLowerCase();
  return list.filter(e => {
    const ms = !q || (e.concept||'').toLowerCase().includes(q) || (e.coreInsight||'').toLowerCase().includes(q) || (e.notes||'').toLowerCase().includes(q);
    const mf = fStage === 'All' || e.funnelStage === fStage;
    const mg = fGroup === 'All' || (e.notes||'').startsWith(fGroup);
    return ms && mf && mg;
  });
}

function sorted(list) {
  return [...list].sort((a,b) => {
    const av = (a[sortCol]||'').toString().toLowerCase();
    const bv = (b[sortCol]||'').toString().toLowerCase();
    return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
  });
}

function statusOpts(tabKey) {
  if (tabKey === 'up') return ['Upcoming', ...PROD_ST];
  if (tabKey === 'prod') return PROD_ST;
  return ARC_ST;
}

const isInProd = () => ['In Copy Production','Needs Copy Review','In Design','Live','Winner','Moved to Archive'].includes(form.status);

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  bindEvents();
}

function buildApp() {
  if (loading) return '<div class="loading">Loading tracker…</div>';

  const upcoming = ads.filter(a => a.status === 'Upcoming');
  const inProd = ads.filter(a => PROD_ST.includes(a.status));
  const archive = ads.filter(a => ARC_ST.includes(a.status));
  const live = ads.filter(a => a.status === 'Live');
  const winners = ads.filter(a => a.status === 'Winner');
  const needsReview = ads.filter(a => a.status === 'Needs Copy Review');
  const inDesign = ads.filter(a => a.status === 'In Design');

  const TABS = [
    {l:'💡 Upcoming', k:'up', cnt:upcoming.length},
    {l:'🎬 In Production', k:'prod', cnt:inProd.length},
    {l:'🗄️ Archive', k:'arc', cnt:archive.length},
    {l:'📊 Table', k:'tbl', cnt:ads.length}
  ];
  const tk = TABS[tab].k;

  let tabContent = '';
  if (tk === 'up') {
    const items = filtered(upcoming);
    tabContent = items.length === 0 ? '<div class="empty">No upcoming concepts match.</div>' : items.map(a => buildCard(a, statusOpts('up'))).join('');
  } else if (tk === 'prod') {
    const mainItems = filtered(ads.filter(a => a.status === 'In Copy Production'));
    tabContent = `
      ${inDesign.length > 0 ? buildColl('🎨 In Design', inDesign, 'design', '#fce7f3', '#9d174d', PROD_ST) : ''}
      ${needsReview.length > 0 ? buildColl('📋 Needs Copy Review', needsReview, 'review', '#ffedd5', '#7c2d12', PROD_ST) : ''}
      ${mainItems.map(a => buildCard(a, PROD_ST)).join('')}
      ${inProd.length === 0 ? '<div class="empty">Nothing in production.</div>' : ''}
    `;
  } else if (tk === 'arc') {
    const groups = ['Winner','Live','Moved to Archive'].map(s => {
      const grp = filtered(ads.filter(a => a.status === s));
      if (!grp.length) return '';
      return `<div style="margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          ${pillStatus(s)}
          <span style="font-size:11px;color:#9ca3af">${grp.length} ad${grp.length>1?'s':''}</span>
        </div>
        ${grp.map(a => buildCard(a, ARC_ST, true)).join('')}
      </div>`;
    }).join('');
    tabContent = groups || '<div class="empty">No archived ads yet.</div>';
  } else {
    tabContent = buildTable();
  }

  return `
    <div class="header">
      <div>
        <div class="header-title">🚛 Mudflap Ad Creative Tracker</div>
        <div class="header-sub">Meta · Heavy 5+ Fleets · ${saving?'Saving…':'Auto-saved'} · ${ads.length} ads</div>
      </div>
      <button class="btn-primary" onclick="openNew()">+ New Brief</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-val" style="color:#1e40af">${upcoming.length}</div><div class="stat-label">Upcoming</div></div>
      <div class="stat"><div class="stat-val" style="color:#713f12">${inProd.length}</div><div class="stat-label">In Production</div></div>
      <div class="stat"><div class="stat-val" style="color:#7c2d12">${needsReview.length}</div><div class="stat-label">Needs Review</div></div>
      <div class="stat"><div class="stat-val" style="color:#14532d">${live.length}</div><div class="stat-label">Live</div></div>
      <div class="stat"><div class="stat-val" style="color:#4c1d95">${winners.length}</div><div class="stat-label">Winners</div></div>
    </div>

    <div class="tabs">
      ${TABS.map((t,i) => `<button class="tab ${tab===i?'active':''}" onclick="setTab(${i})">${t.l}<span class="tab-count">${t.cnt}</span></button>`).join('')}
    </div>

    <div class="filters">
      <input value="${search}" oninput="setSearch(this.value)" placeholder="Search…">
      <select onchange="setFStage(this.value)">
        <option value="All" ${fStage==='All'?'selected':''}>All Stages</option>
        ${STAGES.map(s => `<option value="${s}" ${fStage===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select onchange="setFGroup(this.value)" style="width:210px">
        <option value="All" ${fGroup==='All'?'selected':''}>All Briefs / Pillars</option>
        ${GROUPS.map(g => `<option value="${g}" ${fGroup===g?'selected':''}>${g}</option>`).join('')}
      </select>
      ${(search||fStage!=='All'||fGroup!=='All') ? '<button class="btn-clear" onclick="clearFilters()">Clear</button>' : ''}
    </div>

    <div class="content">${tabContent}</div>

    ${showForm ? buildForm() : ''}
  `;
}

function buildColl(label, entries, key, bg, tx, sopts) {
  const open = key === 'design' ? collDesign : collReview;
  return `
    <div class="coll" style="border:1px solid ${tx}44;background:${bg}">
      <button class="coll-header" style="color:${tx}" onclick="toggleColl('${key}')">
        <span>${label} (${entries.length})</span><span>${open?'▲':'▼'}</span>
      </button>
      ${open ? `<div class="coll-body" style="border-top:1px solid ${tx}33">${entries.map(a => buildCard(a, sopts)).join('')}</div>` : ''}
    </div>
  `;
}

function buildCard(a, sopts, showMetrics) {
  const open = expandedIds.has(a.id);
  const cs = COPY_S[a.format];
  const hasScripts = a.scenes && a.scenes.some(s => s.vo || s.prompt);
  const hasMeta = cs && a.metaCopy && Object.values(a.metaCopy).some(Boolean);
  const showPerf = showMetrics || ['Live','Winner'].includes(a.status);

  return `
    <div class="card ${a.status==='Winner'?'winner':''}">
      <div class="card-header">
        <div class="card-info">
          <div class="card-pills">
            <span class="card-title">${a.concept||'Untitled'}</span>
            ${pillStatus(a.status)}
            ${a.funnelStage ? `<span class="pill pill-stage">${a.funnelStage}</span>` : ''}
            ${a.format ? `<span class="pill pill-format">${a.format}</span>` : ''}
            ${a.tone ? `<span class="pill pill-tone">${a.tone}</span>` : ''}
          </div>
          ${a.coreInsight ? `<div class="card-insight">${a.coreInsight}</div>` : ''}
          ${a.notes ? `<div class="card-notes">${a.notes}</div>` : ''}
        </div>
        <div class="card-actions">
          <select onchange="changeStatus('${a.id}',this.value)">
            ${sopts.map(s => `<option ${a.status===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <button class="btn-dupe" onclick="dupeAd('${a.id}')" title="Duplicate">⎘</button>
          <button class="btn-edit" onclick="openEdit('${a.id}')">Edit</button>
          <button class="btn-expand" onclick="toggleExpand('${a.id}')">${open?'▲':'▼'}</button>
          <button class="btn-delete" onclick="confirmDelete('${a.id}')">✕</button>
        </div>
      </div>
      ${open ? `
        <div class="card-body">
          <div class="card-meta">
            ${[['Job',a.job],['Production',a.productionMethod],['Visual Style',a.visualStyle],['Hypothesis',a.hypothesis]].filter(([,v])=>v).map(([l,v])=>`<div><span class="meta-label">${l}: </span><span class="meta-val">${v}</span></div>`).join('')}
          </div>
          ${hasScripts ? `
            <div>
              <div class="section-title">Script Direction</div>
              ${a.scenes.filter(s=>s.vo||s.prompt).map(s=>`
                <div class="scene-block">
                  <div class="scene-title">${s.label} <span class="scene-timing">(${s.timing})</span></div>
                  ${s.vo ? `<div class="scene-row"><div class="scene-row-label"><span>VO</span><button class="copy-btn" onclick="copyText(this,'${escAttr(s.vo)}')">Copy</button></div><div class="scene-text">${esc(s.vo)}</div></div>` : ''}
                  ${s.prompt ? `<div class="scene-row"><div class="scene-row-label"><span>AI Prompt</span><button class="copy-btn" onclick="copyText(this,'${escAttr(s.prompt)}')">Copy</button></div><div class="scene-prompt">${esc(s.prompt)}</div></div>` : ''}
                </div>
              `).join('')}
            </div>
          ` : ''}
          ${hasMeta ? `
            <div>
              <div class="section-title">Meta Ad Copy (${a.format})</div>
              ${cs.f.map(f => a.metaCopy[f.k] ? `
                <div class="meta-copy-row">
                  <div><span class="meta-label">${f.l}: </span><span class="meta-val">${esc(a.metaCopy[f.k])}</span></div>
                  <button class="copy-btn" onclick="copyText(this,'${escAttr(a.metaCopy[f.k])}')">Copy</button>
                </div>
              ` : '').join('')}
            </div>
          ` : ''}
          ${showPerf ? `
            <div>
              <div class="section-title">Performance</div>
              <div class="perf-grid">
                ${[['thumbStop','Thumb-Stop %'],['viewRate','3s View %'],['completionRate','Completion %'],['ctr','CTR %'],['cpa','CPA ($)'],['notes','Notes']].map(([k,l])=>`
                  <div class="perf-item">
                    <label>${l}</label>
                    <input value="${(a.metrics&&a.metrics[k])||''}" onchange="saveMetric('${a.id}','${k}',this.value)">
                  </div>
                `).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      ` : ''}
    </div>
  `;
}

function buildTable() {
  const cols = [['concept','Concept'],['funnelStage','Stage'],['tone','Tone'],['status','Status'],['notes','Brief']];
  const rows = filtered(sorted(ads));
  return `
    <div class="table-wrap">
      <p style="font-size:12px;color:#9ca3af;margin-bottom:12px">All ${ads.length} ads — click column headers to sort.</p>
      <table>
        <thead>
          <tr>
            ${cols.map(([col,lbl])=>`<th onclick="tblSort('${col}')">${lbl}${sortCol===col?sortDir==='asc'?' ↑':' ↓':''}</th>`).join('')}
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(a=>`
            <tr>
              <td class="td-concept">${esc(a.concept||'—')}</td>
              <td><span class="pill pill-stage">${a.funnelStage||'—'}</span></td>
              <td style="color:#6b7280">${a.tone||'—'}</td>
              <td>${pillStatus(a.status)}</td>
              <td class="td-brief">${a.notes||'—'}</td>
              <td class="tbl-actions">
                <button style="color:#2563eb" onclick="openEdit('${a.id}')">Edit</button>
                <button style="color:#7c3aed" onclick="dupeAd('${a.id}')">Dupe</button>
                <button style="color:#ef4444" onclick="confirmDelete('${a.id}')">✕</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function buildForm() {
  const cs = form.format ? COPY_S[form.format] : null;
  const ip = isInProd();

  return `
    <div class="modal-overlay" onclick="closeForm()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div>
            <div class="modal-title">${editId ? 'Edit Brief' : 'New Creative Brief'}</div>
            <div class="modal-sub">Mudflap · Meta · Heavy 5+ Fleets</div>
          </div>
          <button class="modal-close" onclick="closeForm()">✕</button>
        </div>
        <div class="modal-body">
          <!-- Overview -->
          <div>
            <div class="form-section-title">Overview</div>
            <div class="form-row">
              <div><label class="form-label">Concept Name *</label><input class="form-input" id="f-concept" value="${esc(form.concept)}" placeholder="e.g. The Confession"></div>
              <div><label class="form-label">Week</label><input class="form-input" type="week" id="f-week" value="${form.week}"></div>
            </div>
            <div class="form-group"><label class="form-label">Core Insight *</label><textarea class="form-textarea" id="f-insight" rows="2" placeholder="The one truth this ad is built on…">${esc(form.coreInsight)}</textarea></div>
            <div class="form-group"><label class="form-label">Hypothesis</label><textarea class="form-textarea" id="f-hyp" rows="2" placeholder="Why will this concept move a Heavy 5+ fleet operator?">${esc(form.hypothesis)}</textarea></div>
            <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="f-status">${ALL_ST.map(s=>`<option ${form.status===s?'selected':''}>${s}</option>`).join('')}</select></div>
          </div>

          <!-- Funnel -->
          <div>
            <div class="form-section-title">Funnel</div>
            <div class="form-row">
              <div>
                <label class="form-label">Funnel Stage *</label>
                <select class="form-select" id="f-stage" onchange="formChange('funnelStage',this.value)">
                  <option value="">Select…</option>
                  ${STAGES.map(s=>`<option ${form.funnelStage===s?'selected':''}>${s}</option>`).join('')}
                </select>
                ${form.funnelStage ? `<div class="form-hint">${STAGE_D[form.funnelStage]}</div>` : ''}
              </div>
              <div><label class="form-label">Job To Be Done</label><select class="form-select" id="f-job"><option value="">Select…</option>${JOBS.map(j=>`<option ${form.job===j?'selected':''}>${j}</option>`).join('')}</select></div>
            </div>
          </div>

          <!-- Format & Style -->
          <div>
            <div class="form-section-title">Format & Style</div>
            <div class="form-group">
              <label class="form-label">Format *</label>
              <select class="form-select" id="f-format" onchange="formChange('format',this.value)">
                ${FMTS.map(f=>`<option ${form.format===f?'selected':''}>${f}</option>`).join('')}
              </select>
              ${form.format ? `<div class="form-hint">${FMT_D[form.format]}</div>` : ''}
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
              ${buildDropdown('Tone','f-tone','tone',TONES)}
              ${buildDropdown('Production Method','f-pm','productionMethod',PRODS)}
              ${buildDropdown('Visual Style','f-vs','visualStyle',VISUALS)}
            </div>
          </div>

          <!-- Notes -->
          <div>
            <div class="form-section-title">Notes</div>
            <textarea class="form-textarea" id="f-notes" rows="2" placeholder="Brief / Pillar group, talent, locations, deadlines…">${esc(form.notes)}</textarea>
          </div>

          <!-- Script + Meta -->
          ${!ip ? `
            <div class="locked-box">
              <div class="locked-title">🔒 Script Direction & Ad Copy</div>
              <div class="locked-sub">Unlocks when status moves to <strong>In Copy Production</strong> or beyond.</div>
            </div>
          ` : `
            <div>
              <div class="form-section-title">Script Direction</div>
              ${form.scenes.map((scene,idx) => `
                <div class="scene-form">
                  <div class="scene-form-header">
                    <span class="scene-form-label">${scene.label}</span>
                    <span class="scene-timing-pill">${scene.timing}</span>
                  </div>
                  <div class="form-group">
                    <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                      <label class="form-label" style="margin:0;font-size:11px;color:#6b7280">On-screen text / VO</label>
                      ${scene.vo ? `<button class="copy-btn" onclick="copyText(this,'${escAttr(scene.vo)}')">Copy</button>` : ''}
                    </div>
                    <textarea class="form-textarea" style="background:white" rows="2" onchange="updateScene(${idx},'vo',this.value)">${esc(scene.vo)}</textarea>
                  </div>
                  <div class="form-group" style="margin:0">
                    <div style="display:flex;justify-content:space-between;margin-bottom:3px">
                      <label class="form-label" style="margin:0;font-size:11px;color:#6b7280">AI Prompt</label>
                      ${scene.prompt ? `<button class="copy-btn" onclick="copyText(this,'${escAttr(scene.prompt)}')">Copy</button>` : ''}
                    </div>
                    <textarea class="form-textarea" style="background:white" rows="2" onchange="updateScene(${idx},'prompt',this.value)">${esc(scene.prompt)}</textarea>
                  </div>
                </div>
              `).join('')}
            </div>
            <div>
              <div class="form-section-title">Meta Ad Copy</div>
              ${cs ? `
                <div class="copy-spec-box">
                  <div class="copy-spec-title">${form.format} — Copy Spec</div>
                  <div class="copy-spec-note">${cs.note}</div>
                </div>
                ${cs.f.map(f => {
                  const val = form.metaCopy[f.k] || '';
                  const over = val.length > f.lim;
                  return `
                    <div class="form-group">
                      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
                        <label class="form-label" style="margin:0">${f.l}</label>
                        <div style="display:flex;gap:8px;align-items:center">
                          ${val ? `<button class="copy-btn" onclick="copyText(this,'${escAttr(val)}')">Copy</button>` : ''}
                          <span class="char-count ${over?'char-over':'char-ok'}">${val.length}/${f.lim}</span>
                        </div>
                      </div>
                      ${f.k==='primaryText' ? `<textarea class="form-textarea ${over?'border-red':''}" rows="3" onchange="updateMeta('${f.k}',this.value)">${esc(val)}</textarea>` : `<input class="form-input ${over?'border-red':''}" value="${esc(val)}" onchange="updateMeta('${f.k}',this.value)">`}
                    </div>
                  `;
                }).join('')}
              ` : ''}
            </div>
          `}
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeForm()">Cancel</button>
          <button class="btn-primary" onclick="submitForm()">${saving?'Saving…':'Save Brief'}</button>
        </div>
      </div>
    </div>
  `;
}

function buildDropdown(label, id, key, opts) {
  return `
    <div>
      <label class="form-label">${label}</label>
      <select class="form-select" id="${id}" onchange="formChange('${key}',this.value)">
        <option value="">Select…</option>
        ${opts.map(t=>`<option value="${t.v}" ${form[key]===t.v?'selected':''}>${t.v}</option>`).join('')}
      </select>
      ${form[key] && form[key] !== 'TBD' ? `<div class="form-hint" style="font-size:11px">${opts.find(t=>t.v===form[key])?.d||''}</div>` : ''}
    </div>
  `;
}

// ─── ESCAPE HELPERS ───────────────────────────────────────────────────────────
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return (s||'').replace(/'/g,'&#39;').replace(/\n/g,'\\n'); }

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
function bindEvents() {}

window.setTab = i => { tab = i; render(); };
window.setSearch = v => { search = v; render(); };
window.setFStage = v => { fStage = v; render(); };
window.setFGroup = v => { fGroup = v; render(); };
window.clearFilters = () => { search=''; fStage='All'; fGroup='All'; render(); };
window.toggleExpand = id => { expandedIds.has(id) ? expandedIds.delete(id) : expandedIds.add(id); render(); };
window.toggleColl = key => { if (key==='review') collReview=!collReview; else collDesign=!collDesign; render(); };
window.tblSort = col => { if (sortCol===col) sortDir=sortDir==='asc'?'desc':'asc'; else { sortCol=col; sortDir='asc'; } render(); };

window.changeStatus = async (id, status) => {
  saving = true; render();
  await updateStatus(id, status);
  saving = false; render();
};

window.confirmDelete = id => {
  if (confirm('Delete this ad?')) deleteAd(id);
};

window.dupeAd = async id => {
  const a = ads.find(x => x.id === id);
  if (!a) return;
  const copy = {...a, id:'new_'+Date.now(), concept:a.concept+' (New Test)', status:'Upcoming', week:'', metrics:{thumbStop:'',viewRate:'',completionRate:'',ctr:'',cpa:'',notes:''}, scenes:(a.scenes||blankScenes()).map(s=>({...s})), metaCopy:{...a.metaCopy}};
  saving = true; render();
  await saveAd(copy);
  saving = false; render();
  toast('Duplicated!');
};

window.saveMetric = async (id, key, val) => {
  await updateMetric(id, key, val);
};

window.copyText = (btn, text) => {
  navigator.clipboard.writeText(text.replace(/\\n/g,'\n'));
  btn.textContent = '✓';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1400);
};

window.openNew = () => { form = blankForm(); editId = null; showForm = true; render(); };
window.openEdit = id => {
  const a = ads.find(x => x.id === id);
  if (!a) return;
  form = {
    id: a.id, concept:a.concept||'', funnelStage:a.funnelStage||'', job:a.job||'',
    format:a.format||'Reel', tone:a.tone||'', productionMethod:a.productionMethod||'',
    visualStyle:a.visualStyle||'', week:a.week||'', status:a.status||'Upcoming',
    coreInsight:a.coreInsight||'', hypothesis:a.hypothesis||'', notes:a.notes||'',
    metaCopy:{...({primaryText:'',headline:'',description:'',displayUrl:''},...(a.metaCopy||{}))},
    scenes:(a.scenes||blankScenes()).map(s=>({...s})),
    metrics:{...({thumbStop:'',viewRate:'',completionRate:'',ctr:'',cpa:'',notes:''},...(a.metrics||{}))}
  };
  editId = id; showForm = true; render();
};
window.closeForm = () => { showForm = false; render(); };

window.formChange = (key, val) => { form[key] = val; showForm = true; render(); };
window.updateScene = (idx, field, val) => { form.scenes[idx][field] = val; };
window.updateMeta = (key, val) => { form.metaCopy[key] = val; };

window.submitForm = async () => {
  const concept = document.getElementById('f-concept')?.value.trim();
  if (!concept) { toast('Concept name is required'); return; }
  form.concept = concept;
  form.coreInsight = document.getElementById('f-insight')?.value || '';
  form.hypothesis = document.getElementById('f-hyp')?.value || '';
  form.status = document.getElementById('f-status')?.value || 'Upcoming';
  form.funnelStage = document.getElementById('f-stage')?.value || '';
  form.job = document.getElementById('f-job')?.value || '';
  form.format = document.getElementById('f-format')?.value || 'Reel';
  form.tone = document.getElementById('f-tone')?.value || '';
  form.productionMethod = document.getElementById('f-pm')?.value || '';
  form.visualStyle = document.getElementById('f-vs')?.value || '';
  form.week = document.getElementById('f-week')?.value || '';
  form.notes = document.getElementById('f-notes')?.value || '';
  // collect scene textareas
  document.querySelectorAll('.scene-form').forEach((el, idx) => {
    const tas = el.querySelectorAll('textarea');
    if (tas[0]) form.scenes[idx].vo = tas[0].value;
    if (tas[1]) form.scenes[idx].prompt = tas[1].value;
  });
  saving = true; render();
  const ok = await saveAd({...form, id: editId || form.id});
  saving = false;
  if (ok) { showForm = false; toast('Saved!'); }
  render();
};

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render();
loadAds();
</script>
</body>
</html>
