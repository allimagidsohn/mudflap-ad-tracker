<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 Hook Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;color:#111827;min-height:100vh;padding:32px 20px}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:20px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:#6b7280;margin-bottom:24px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.card{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:16px;text-align:center}
.card .num{font-size:28px;font-weight:700}
.card .lbl{font-size:12px;color:#9ca3af;margin-top:2px}
.list{background:white;border:1px solid #e5e7eb;border-radius:8px;max-height:200px;overflow-y:auto;margin-bottom:16px}
.list-row{padding:8px 12px;border-bottom:1px solid #f3f4f6;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.list-row:last-child{border-bottom:none}
.list-row .name{font-weight:500;color:#111827}
.list-row .missing{color:#9ca3af}
.btn{width:100%;background:#2563eb;color:white;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px}
.btn:hover{background:#1d4ed8}
.btn:disabled{background:#93c5fd;cursor:not-allowed}
.progress-row{display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:6px}
.bar-bg{background:#e5e7eb;border-radius:99px;height:8px;overflow:hidden;margin-bottom:16px}
.bar-fill{background:#2563eb;height:100%;transition:width 0.3s}
.log{background:#111827;border-radius:10px;padding:14px;max-height:300px;overflow-y:auto}
.log-line{font-size:12px;font-family:monospace;margin-bottom:3px}
.log-line.success{color:#4ade80}
.log-line.error{color:#f87171}
.log-line.info{color:#e5e7eb}
.done-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;font-size:13px;color:#15803d;margin-bottom:16px}
.empty-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;font-size:13px;color:#15803d;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🤖 Hook B/C + Primary Text Generator</h1>
  <p class="sub">Generates missing Hook B, Hook C, and Primary Text for all ads using Claude AI, then saves directly to Supabase.</p>
  <div class="cards">
    <div class="card"><div class="num" id="total-count">—</div><div class="lbl">Total ads</div></div>
    <div class="card"><div class="num" id="needs-count" style="color:#d97706">—</div><div class="lbl">Need generation</div></div>
  </div>
  <div id="list-wrap"></div>
  <div id="progress-wrap" style="display:none">
    <div class="progress-row"><span id="progress-label">Starting…</span><span id="progress-frac">0/0</span></div>
    <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
  </div>
  <button class="btn" id="go-btn" onclick="generate()" disabled>Loading…</button>
  <div id="log-wrap" style="display:none"><div class="log" id="log"></div></div>
</div>

<script>
const SB_URL='https://fngxmhqkowrkzpgcofbn.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZuZ3htaHFrb3dya3pwZ2NvZmJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODQ3ODgsImV4cCI6MjA5MDU2MDc4OH0.rjLoi5Pz4d5UP_XF3AnxJ2ViY-jxpetwz_U7tWPWsoo';
const sb=supabase.createClient(SB_URL,SB_KEY);

let allAds=[], needsWork=[];

function needsGen(ad){
  const sc=ad.scenes||[];
  const hb=sc.find(s=>s.id==='hb');
  const hc=sc.find(s=>s.id==='hc');
  const meta=ad.meta_copy||{};
  return !hb?.vo||!hc?.vo||!meta.primaryText;
}

async function init(){
  const{data}=await sb.from('ads').select('*').order('created_at',{ascending:true});
  allAds=data||[];
  needsWork=allAds.filter(needsGen);

  document.getElementById('total-count').textContent=allAds.length;
  const nc=document.getElementById('needs-count');
  nc.textContent=needsWork.length;
  nc.style.color=needsWork.length>0?'#d97706':'#16a34a';

  const listWrap=document.getElementById('list-wrap');
  if(needsWork.length===0){
    listWrap.innerHTML='<div class="empty-box">✓ All ads already have Hook B, Hook C, and Primary Text!</div>';
    document.getElementById('go-btn').style.display='none';
    return;
  }

  let rows=needsWork.map(ad=>{
    const sc=ad.scenes||[];
    const hb=sc.find(s=>s.id==='hb');
    const hc=sc.find(s=>s.id==='hc');
    const meta=ad.meta_copy||{};
    const missing=[];
    if(!hb?.vo)missing.push('Hook B');
    if(!hc?.vo)missing.push('Hook C');
    if(!meta.primaryText)missing.push('Primary Text');
    return`<div class="list-row"><span class="name">${ad.concept}</span><span class="missing">${missing.join(', ')}</span></div>`;
  }).join('');
  listWrap.innerHTML=`<div class="list">${rows}</div>`;

  const btn=document.getElementById('go-btn');
  btn.textContent=`Generate for ${needsWork.length} ad${needsWork.length!==1?'s':''}`;
  btn.disabled=false;
}

function log(msg,type='info'){
  const wrap=document.getElementById('log-wrap');
  wrap.style.display='block';
  const el=document.getElementById('log');
  const line=document.createElement('div');
  line.className=`log-line ${type}`;
  line.textContent=msg;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}

async function generate(){
  const btn=document.getElementById('go-btn');
  btn.disabled=true;
  document.getElementById('progress-wrap').style.display='block';

  for(let i=0;i<needsWork.length;i++){
    const ad=needsWork[i];
    const frac=`${i+1}/${needsWork.length}`;
    document.getElementById('progress-label').textContent=`Processing: ${ad.concept}`;
    document.getElementById('progress-frac').textContent=frac;
    document.getElementById('bar').style.width=`${Math.round((i/needsWork.length)*100)}%`;
    log(`Processing: ${ad.concept}…`);

    try{
      const sc=ad.scenes||[];
      const ha=sc.find(s=>s.id==='ha');
      const pr=sc.find(s=>s.id==='pr');
      const ins=sc.find(s=>s.id==='ins');
      const sol=sc.find(s=>s.id==='sol');
      const ct=sc.find(s=>s.id==='ct');
      const meta=ad.meta_copy||{};

      const prompt=`You are a creative director writing Meta ad copy for Mudflap, a fuel savings app for heavy truck fleet operators (5+ trucks). You write short, punchy copy that speaks to operators who are skeptical, busy, and value real savings over marketing speak.

AD CONTEXT:
- Concept: ${ad.concept}
- Core Insight: ${ad.core_insight||''}
- Tone: ${ad.tone||'Direct / Authoritative'}
- Funnel Stage: ${ad.funnel_stage||'Awareness'}
- Hook A (0–2s, ~5 words): ${ha?.vo||''}
- Problem (2–5s): ${pr?.vo||''}
- Insight (5–8s): ${ins?.vo||''}
- Solution (8–12s): ${sol?.vo||''}
- CTA (12–15s): ${ct?.vo||''}

Generate THREE things. Hook B and Hook C must test completely different emotions from Hook A and from each other. If Hook A is provocative, try empathetic or humorous. Each hook should be ~5 words max.

For Primary Text: write copy that feels native to the Meta feed — not an ad headline. Max 125 chars. No hashtags. Pick the tone that best serves this specific concept and funnel stage.

Respond ONLY with valid JSON, no markdown, no explanation:
{"hookB":"...","hookC":"...","primaryText":"..."}`;

      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:500,
          messages:[{role:'user',content:prompt}]
        })
      });

      const data=await res.json();
      const text=data.content?.find(b=>b.type==='text')?.text||'';
      const clean=text.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);

      const newScenes=sc.map(s=>{
        if(s.id==='hb'&&!s.vo)return{...s,vo:parsed.hookB};
        if(s.id==='hc'&&!s.vo)return{...s,vo:parsed.hookC};
        return s;
      });
      const newMeta={...{primaryText:'',headline:'',description:'',displayUrl:''},...meta};
      if(!newMeta.primaryText)newMeta.primaryText=parsed.primaryText;

      await sb.from('ads').update({scenes:newScenes,meta_copy:newMeta,primary_text:newMeta.primaryText}).eq('id',ad.id);
      log(`✓ ${ad.concept}`, 'success');

    }catch(e){
      log(`✗ ${ad.concept} — ${e.message}`, 'error');
    }

    await new Promise(r=>setTimeout(r,400));
  }

  document.getElementById('bar').style.width='100%';
  document.getElementById('progress-label').textContent='All done!';
  log('─────────────────────────────', 'info');
  log('✓ All done! Reload your tracker to see the updates.', 'success');
  btn.textContent='Done!';
}

init();
</script>
</body>
</html>
